<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links of Ocean Mallik</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grid-overlay" aria-hidden="true"></div>

    <main class="container">
        <section class="profile-card">
            <img src="me.jpg" alt="Ocean Mallik" class="profile-pic">

            <h1><span class="name-ocean">Ocean</span> <span class="name-mallik">Mallik</span></h1>
            <p class="bio"><span id="typing-bio" class="typing-bio" data-text="Software Engineering Student from DIU"></span></p>

            <div class="link-container">
                <a href="https://oceanmallik.com" class="link-btn" target="_blank" rel="noopener noreferrer"><img src="icons/website.svg" class="link-icon website-icon" alt="" aria-hidden="true"> My Website</a>
                <a href="https://blog.oceanmallik.com" class="link-btn" target="_blank" rel="noopener noreferrer"><img src="icons/website.svg" class="link-icon website-icon" alt="" aria-hidden="true"> My Blog Site</a>
                <a href="https://github.com/oceanmallik" class="link-btn" target="_blank" rel="noopener noreferrer"><img src="icons/github.svg" class="link-icon github-icon" alt="" aria-hidden="true"> GitHub</a>
                <a href="https://steamcommunity.com/id/oceanmallik/" class="link-btn" target="_blank" rel="noopener noreferrer"><img src="icons/steam.svg" class="link-icon steam-icon" alt="" aria-hidden="true"> Steam</a>
            </div>
        </section>
    </main>

    <aside class="desktop-qr" aria-label="Mobile access QR code">
        <img src="QR.svg" alt="QR code to open this page on mobile" class="desktop-qr-image">
        <p class="desktop-qr-text">Open it on mobile</p>
    </aside>

    <script>
        (function () {
            const typingElement = document.getElementById("typing-bio");
            if (!typingElement) return;

            const text = typingElement.dataset.text || "";
            const typeSpeed = 75;
            const eraseSpeed = 38;
            const stayDelay = 5000;
            const loopDelay = 500;

            let index = 0;
            let isDeleting = false;

            function tick() {
                if (!isDeleting) {
                    index += 1;
                    typingElement.textContent = text.slice(0, index);

                    if (index === text.length) {
                        isDeleting = true;
                        setTimeout(tick, stayDelay);
                        return;
                    }

                    setTimeout(tick, typeSpeed);
                    return;
                }

                index -= 1;
                typingElement.textContent = text.slice(0, index);

                if (index === 0) {
                    isDeleting = false;
                    setTimeout(tick, loopDelay);
                    return;
                }

                setTimeout(tick, eraseSpeed);
            }

            tick();
        })();
    </script>

</body>
</html>
