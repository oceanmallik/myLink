<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ocean Mallik</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <div class="content-wrapper">
      <!-- Profile Section -->
      <section class="profile-section">
        <div class="profile-image-container">
          <img src="me.jpg" alt="Ocean Mallik" class="profile-image">
        </div>
                
        <div class="profile-info">
          <h1 class="profile-name">Ocean Mallik</h1>
          <p class="profile-bio">Software Engineering Student from DIU</p>
        </div>

        <!-- Social Media Icons -->
        <div class="social-media-section">
          <a href="https://github.com/oceanmallik" class="social-icon" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
            <img src="icons/github.svg" alt="GitHub" class="social-icon-img">
          </a>
          <a href="https://www.linkedin.com/in/oceanmallik/" class="social-icon" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
            <img src="icons/linkedin.svg" alt="LinkedIn" class="social-icon-img">
          </a>
          <a href="https://steamcommunity.com/id/oceanmallik/" class="social-icon" target="_blank" rel="noopener noreferrer" aria-label="Steam">
            <img src="icons/steam.svg" alt="Steam" class="social-icon-img">
          </a>
        </div>
      </section>

      <!-- Links Section -->
      <section class="links-section">
        <div class="links-grid">
          <a href="https://oceanmallik.com" class="link-card" target="_blank" rel="noopener noreferrer">
            <div class="link-icon-wrapper">
              <img src="icons/website.svg" alt="" class="link-icon" aria-hidden="true">
            </div>
            <div class="link-content">
              <span class="link-label">Website</span>
              <span class="link-url">oceanmallik.com</span>
            </div>
            <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </a>

          <a href="https://blog.oceanmallik.com" class="link-card" target="_blank" rel="noopener noreferrer">
            <div class="link-icon-wrapper">
              <img src="icons/website.svg" alt="" class="link-icon" aria-hidden="true">
            </div>
            <div class="link-content">
              <span class="link-label">Blog</span>
              <span class="link-url">blog.oceanmallik.com</span>
            </div>
            <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </a>

          <a href="https://github.com/oceanmallik" class="link-card" target="_blank" rel="noopener noreferrer">
            <div class="link-icon-wrapper">
              <img src="icons/github.svg" alt="" class="link-icon" aria-hidden="true">
            </div>
            <div class="link-content">
              <span class="link-label">GitHub</span>
              <span class="link-url">@oceanmallik</span>
            </div>
            <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </a>

          <a href="https://www.linkedin.com/in/oceanmallik/" class="link-card" target="_blank" rel="noopener noreferrer">
            <div class="link-icon-wrapper">
              <img src="icons/linkedin.svg" alt="" class="link-icon" aria-hidden="true">
            </div>
            <div class="link-content">
              <span class="link-label">LinkedIn</span>
              <span class="link-url">@oceanmallik</span>
            </div>
            <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </a>

          <a href="https://steamcommunity.com/id/oceanmallik/" class="link-card" target="_blank" rel="noopener noreferrer">
            <div class="link-icon-wrapper">
              <img src="icons/steam.svg" alt="" class="link-icon" aria-hidden="true">
            </div>
            <div class="link-content">
              <span class="link-label">Steam</span>
              <span class="link-url">@oceanmallik</span>
            </div>
            <svg class="link-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="5" y1="12" x2="19" y2="12"></line>
              <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
          </a>
        </div>
      </section>
    </div>
  </main>

  <aside class="desktop-qr" aria-label="Mobile access QR code">
    <div class="desktop-qr-wrapper">
      <img src="QR.svg" alt="QR code to open this page on mobile" class="desktop-qr-image">
    </div>
    <p class="desktop-qr-text">Open it on mobile</p>
  </aside>

  <script>
    // Cache-bust QR on load so deploys update the image reliably
    (function(){
      const img = document.querySelector('.desktop-qr-image');
      if (!img) return;
      img.src = 'QR.svg?v=' + Math.floor(Date.now()/1000);
      img.addEventListener('error', () => img.alt = 'QR failed to load');
    })();
  </script>
</body>
</html>
